<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASC - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <!-- Logo SASC -->
            <div class="login-logo">
                <svg class="sasc-logo-small" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
                    <text x="350" y="200" font-size="120" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="8">SASC</text>
                </svg>
            </div>

            <!-- Formulário de Login -->
            <form id="loginForm" class="login-form">
                <!-- Campo Email -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="email" id="email" name="email" placeholder="email" required>
                    </div>
                </div>

                <!-- Campo ID da Empresa -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🏢</span>
                        <input type="text" id="company-id" name="company-id" placeholder="id da empresa" required>
                    </div>
                </div>

                <!-- Campo Senha -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="senha" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                </div>

                <!-- Link Esqueceu Senha -->
                <div class="forgot-password">
                    <a href="forgot-password.html">ESQUECEU SUA SENHA?</a>
                </div>

                <!-- Botão Entrar -->
                <button type="submit" class="btn btn-login">ENTRAR</button>
            </form>

            <!-- Texto Descritivo -->
            <div class="login-description">
                <p>acesse sua conta para gerenciar os dados de satisfação</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
